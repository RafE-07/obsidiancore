{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card bg-black border-success p-4">
            <h3 class="mb-4 terminal-heading">{% if action == "Create" %}New Task{% else %}Edit Task{% endif %}</h3>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-outline-success px-4">Save</button>
                    <a href="{% url 'task_list' %}" class="btn btn-outline-danger px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
