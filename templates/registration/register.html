{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card bg-black border-success p-4">
            <h3 class="text-center mb-4 terminal-heading">Create Access Credentials</h3>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-outline-success w-100">Register</button>
            </form>
            <p class="text-center mt-2 mb-0">Already have an account? <a href="{% url 'login' %}" class="text-decoration-underline">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
