{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card bg-black border-success p-4">
            <h3 class="text-center mb-4 terminal-heading">Access Terminal</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                    {% if form.username.errors %}
                        <div class="text-danger small">{{ form.username.errors }}</div>
                    {% endif %}
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    {{ form.password }}
                    {% if form.password.errors %}
                        <div class="text-danger small">{{ form.password.errors }}</div>
                    {% endif %}
                </div>
                <button type="submit" class="btn btn-outline-success w-100 mb-2">Login</button>
            </form>
            <p class="text-center mt-2 mb-0">New user? <a href="{% url 'register' %}" class="text-decoration-underline">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}
