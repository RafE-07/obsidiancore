<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ObsidianCore</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-black text-success">
    <nav class="navbar navbar-dark bg-dark border-bottom border-success mb-4">
    <div class="container-fluid">
        <a class="navbar-brand text-success fw-bold" href="{% url 'task_list' %}">
            ◈ ObsidianCore
        </a>
        <div class="d-flex align-items-center">
            {% if user.is_authenticated %}
                <span class="navbar-text text-success me-3">[{{ user.username }}]</span>
                <form method="post" action="{% url 'logout' %}" class="m-0">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-success btn-sm">Logout</button>
                </form>
            {% else %}
                <a class="btn btn-outline-success btn-sm me-2" href="{% url 'login' %}">Login</a>
                <a class="btn btn-success btn-sm" href="{% url 'register' %}">Sign Up</a>
            {% endif %}
        </div>
    </div>
</nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-dark border-success text-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
